<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CCS Sit-in Monitoring System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- NAVBAR -->
    <header class="navbar">
        <h1>College of Computer Studies Sit-in Monitoring System</h1>
        <nav class="nav-links">
            <a href="#">Home</a>
            <a href="#">Community</a>
            <a href="#">About</a>
            <a href="#">Login</a>
            <a href="register.html">Register</a>
        </nav>
    </header>

    <!-- MAIN CONTENT -->
    <main class="container">

        <!-- LOGO -->
        <div class="logo">
            <img src="logo.png" alt="College of Computer Studies Logo" width="300">
        </div>

        <!-- LOGIN FORM -->
        <section class="login-box">
            <form action="#" method="POST">

                <div class="input-group">
                    <label for="idNumber">ID Number</label>
                    <input type="text" id="idNumber" name="idNumber" placeholder="Enter a valid ID number" required>
                </div>

                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Enter password" required>
                </div>

                <div class="login-options">
          
                    <a href="#">Forgot password?</a>
                </div>

                <button type="submit" class="login-btn">Login</button>

                <p class="register">
                    Don't have an account? <a href="register.html">Register</a>
                </p>

            </form>
        </section>

    </main>

</body>
</html>
